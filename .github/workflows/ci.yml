name: "CI - Validacion del Pipeline"

on:
  pull_request:
    branches: [dev, qa, main]

jobs:
  probar_codigo:
    name: "Instalar y Ejecutar Tests"
    runs-on: ubuntu-latest

    steps:
      - name: "1. Descargar el codigo"
        uses: actions/checkout@v4

      - name: "2. Configurar Python en la Nube"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "3. Instalar librerias del proyecto"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "4. Correr Pruebas de Calidad (Pytest)"
        run: pytest tests/ -v